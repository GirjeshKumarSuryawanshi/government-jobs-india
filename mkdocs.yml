site_name: GovtJobNow Developer Hub
site_description: Professional Documentation for SEO, Technical SEO, AEO, GEO, Schema.org and AI Search.
site_author: GovtJobNow
site_url: https://girjeshkumarsuryawanshi.github.io/government-jobs-india/

repo_url: https://github.com/GirjeshKumarSuryawanshi/government-jobs-india
repo_name: GitHub
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: https://img.shields.io/badge/GovtJobNow-blue?logo=github&logoColor=white
  favicon: https://github.com/favicon.ico
  
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.action.view
    - toc.integrate
    - toc.follow

markdown_extensions:
  - admonition
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

plugins:
  - search

nav:
  - Home: index.md
  - About: about.md
  - Categories: categories.md
  - Documentation:
      - SEO: seo.md
      - GEO: geo.md
      - AEO: aeo.md
      - Schema.org: schema.md
      - Sitemap: sitemap.md
      - Robots: robots.md
      - API: api.md
      - Structured Data: structured-data.md
  - FAQ: faq.md